name: AI Daily Digest

on:
  schedule:
    # GitHub cron as last-resort fallback (unreliable for new repos).
    # Primary trigger: cron-job.org calls the GitHub API at 08:05 Beijing time.
    - cron: '0 2 * * *'  # UTC 02:00 = Beijing 10:00, far-fallback only
  workflow_dispatch: # Allow manual trigger (also used by cron-job.org)

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          AI_PROVIDER: gemini 
          API_KEY: ${{ secrets.API_KEY }}
          # API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.deepseek.com' }}
          # API_MODEL: ${{ vars.API_MODEL || 'deepseek-chat' 
          API_BASE_URL: 'https://generativelanguage.googleapis.com/v1beta'
          API_MODEL: 'gemini-2.0-flash'
        run: cd scripts && python main.py

      - name: Commit and push
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@github.com"
          git add daily/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Shanghai date +"%Y-%m-%d")
            git commit -m "📰 Daily digest for ${DATE}"
            git pull --rebase
            git push
          fi
